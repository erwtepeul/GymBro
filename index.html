<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymBro">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>GymBro</title>
<style>
  :root{
    --bg:#0a0a0f; --bg2:#111119; --card:#15151f; --card2:#1c1c28;
    --ink:#f2f2f7; --muted:#7a7a8c; --line:#26263a;
    --neon:#39ff14; --neon2:#00f0ff; --danger:#ff2e6a;
    --radius:18px;
    --glow:0 0 12px rgba(57,255,20,.55), 0 0 26px rgba(57,255,20,.25);
    --glow-cy:0 0 12px rgba(0,240,255,.5), 0 0 26px rgba(0,240,255,.2);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(57,255,20,.10), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    display:flex; flex-direction:column;
    height:100vh; height:100dvh; overflow:hidden;
    padding-top:env(safe-area-inset-top);
  }
  /* header / wordmark */
  header{flex:0 0 auto;padding:32px 20px 6px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:12px}
  .brand svg{width:34px;height:34px;filter:drop-shadow(var(--glow))}
  .wordmark{
    font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1;
    text-transform:uppercase;
    color:var(--neon);
    text-shadow:var(--glow);
  }
  .wordmark b{color:var(--neon2);text-shadow:var(--glow-cy)}
  .namecol{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
  .ver{margin-top:3px;font-size:8px;font-weight:700;letter-spacing:.5px;
    color:var(--muted);text-transform:uppercase}

  main{flex:1 1 auto; overflow-y:auto; padding:2px 18px calc(80px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling:touch}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);
    margin:22px 4px 10px;font-weight:800}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .row{display:flex;gap:10px;align-items:center}

  input,select{
    font-size:16px;font-family:inherit;color:var(--ink);font-weight:600;
    background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    padding:15px;width:100%;outline:none;transition:.15s;
  }
  input::placeholder{color:#55556a}
  input:focus,select:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(57,255,20,.15)}

  button{
    font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;
    border:none;border-radius:12px;padding:15px 18px;text-transform:uppercase;letter-spacing:.5px;
    background:var(--neon);color:#04120a;box-shadow:var(--glow);transition:.12s;
  }
  button:active{transform:scale(.97)}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none;text-transform:none;letter-spacing:0}

  .big-num{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;color:var(--neon);text-shadow:var(--glow)}
  .unit{font-size:16px;color:var(--muted);font-weight:700}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;font-weight:600}

  .pill{display:inline-block;font-size:11px;font-weight:800;padding:6px 12px;border-radius:999px;
    background:var(--bg2);border:1px solid var(--line);color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .pill.ok{color:var(--neon);border-color:var(--neon);box-shadow:var(--glow)}
  .pill.due{color:var(--neon2);border-color:var(--neon2);box-shadow:var(--glow-cy)}

  ul{list-style:none;margin:0;padding:0}
  li.entry{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--line)}
  li.entry:last-child{border-bottom:none}
  li.entry .name{font-weight:700}
  li.entry .w{margin-left:auto;font-weight:900;color:var(--neon2)}
  li.entry .del{margin-left:6px;background:none;color:var(--muted);border:none;padding:6px;font-size:16px;box-shadow:none}
  .empty{color:var(--muted);font-size:14px;padding:14px 0;font-weight:600}

  /* shake */
  .shake{display:flex;flex-direction:column;align-items:center;gap:16px;padding:22px}
  .shake .glass{font-size:60px;filter:grayscale(1) brightness(.7);opacity:.5;transition:.25s}
  .shake.done .glass{filter:none;opacity:1;transform:scale(1.06)}
  .shake .label{font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .shake.done .label{color:var(--neon)}
  .toggle{width:100%;padding:18px;border-radius:14px;border:2px solid var(--line);
    background:transparent;color:var(--ink);box-shadow:none}
  .shake.done .toggle{background:var(--neon);color:#04120a;border-color:var(--neon);box-shadow:var(--glow)}
  .streak-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:10px}
  .streak{font-size:13px;color:var(--neon2);font-weight:800;text-transform:uppercase;letter-spacing:1px}
  .streak-title{font-size:12px;color:var(--neon);font-weight:800;text-transform:uppercase;letter-spacing:1.5px;
    text-shadow:0 0 8px rgba(57,255,20,.35)}

  .weekrow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
  .weekrow:last-child{border-bottom:none}
  .weekrow .wk{font-weight:700}
  .weekrow .kg{font-weight:900;color:var(--neon)}
  .weekrow .muted{color:var(--muted);font-weight:600}
  .delta{font-size:12px;font-weight:800;margin-left:8px}
  .delta.up{color:var(--danger)}.delta.down{color:var(--neon)}

  /* toast */
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    background:var(--neon);color:#04120a;font-weight:800;padding:12px 20px;border-radius:999px;
    box-shadow:var(--glow);opacity:0;pointer-events:none;transition:.3s;z-index:60;
    text-transform:uppercase;letter-spacing:.5px;font-size:13px;max-width:88%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* weight chart */
  .chart{width:100%;height:auto;overflow:visible;display:block}
  .cg{stroke:var(--line);stroke-width:1}
  .cl{fill:var(--muted);font-size:9px;font-weight:700}
  .cline{fill:none;stroke:var(--neon);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round;
    filter:drop-shadow(0 0 4px rgba(57,255,20,.6))}
  .carea{fill:rgba(57,255,20,.12);stroke:none}
  .cd{fill:var(--neon2);stroke:var(--card);stroke-width:1.5}

  /* calendar */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-head{text-align:center;font-weight:800;text-transform:uppercase;letter-spacing:1px;
    font-size:13px;color:var(--ink);margin:0}
  .cal-btn{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:10px;
    width:36px;height:32px;padding:0;font-size:18px;font-weight:800;line-height:1;box-shadow:none}
  .cal-btn:disabled{opacity:.25}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{text-align:center;font-size:10px;font-weight:800;color:var(--muted);padding-bottom:4px}
  .cal-cell{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:var(--ink);border:2px solid transparent;border-radius:50%}
  .cal-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:var(--neon2);box-shadow:0 0 4px var(--neon2)}
  .cal-cell.done{border-color:var(--neon);color:var(--neon);box-shadow:var(--glow)}
  .cal-cell.today{color:var(--neon2)}
  .cal-cell.today.done{color:var(--neon)}

  .danger-btn{margin-top:22px;width:100%;background:transparent;color:var(--danger);
    border:2px solid var(--danger);box-shadow:none}
  .danger-btn:active{background:var(--danger);color:#fff}

  /* goal */
  .goal-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;
    padding-top:14px;border-top:1px solid var(--line)}
  .goal-row span{font-weight:800;font-size:14px;color:var(--ink)}
  .goal-row b{color:var(--neon2)}
  .goal-row .ghost{padding:8px 14px;font-size:13px}
  .cgoal{stroke:var(--neon2);stroke-width:1.5;stroke-dasharray:5 4;opacity:.9}

  /* week summary */
  .wsum{display:flex;justify-content:space-around;text-align:center;gap:8px}
  .wsum .val{font-size:26px;font-weight:900;color:var(--neon);text-shadow:var(--glow);line-height:1}
  .wsum .lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:6px}

  /* exercise-history modal */
  .modal{position:fixed;inset:0;z-index:80;display:flex;align-items:flex-end;justify-content:center;
    background:rgba(0,0,0,.6);backdrop-filter:blur(3px)}
  .modal[hidden]{display:none}
  .modal-card{background:var(--card);border:1px solid var(--line);border-radius:20px 20px 0 0;
    width:100%;max-width:520px;max-height:82vh;overflow-y:auto;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom))}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .modal-head span{font-weight:900;font-size:18px;color:var(--neon);text-transform:uppercase;letter-spacing:.5px}
  .modal-x{background:none;color:var(--muted);box-shadow:none;padding:6px;font-size:18px}
  .link{cursor:pointer}

  /* nav */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;border-top:1px solid var(--line);
    background:rgba(10,10,15,.92);backdrop-filter:blur(10px);padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;color:var(--muted);border:none;border-radius:0;box-shadow:none;
    padding:12px 0 10px;font-size:10px;font-weight:800;letter-spacing:1px;
    display:flex;flex-direction:column;align-items:center;gap:5px;text-transform:uppercase}
  nav button .ico{width:26px;height:26px;opacity:.85}
  nav button .ico svg{width:26px;height:26px;display:block}
  nav button.active{color:var(--neon)}
  nav button.active .ico{opacity:1;filter:drop-shadow(var(--glow))}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <g fill="var(--neon)">
        <rect x="6"  y="38" width="13" height="24" rx="6"/>
        <rect x="24" y="28" width="13" height="44" rx="6"/>
        <rect x="37" y="45" width="26" height="10" rx="5"/>
        <rect x="63" y="28" width="13" height="44" rx="6"/>
        <rect x="81" y="38" width="13" height="24" rx="6"/>
      </g>
    </svg>
    <div class="namecol">
      <span class="wordmark">Gym<b>Bro</b></span>
      <span class="ver" id="verLabel">v1.5.2</span>
    </div>
  </div>
</header>

<main>
  <!-- TODAY -->
  <section class="view active" id="view-today">
    <div class="card" style="margin-top:24px">
      <div class="shake" id="shakeBox">
        <div class="glass">🥤</div>
        <div class="label" id="shakeLabel">Not logged yet</div>
        <button class="toggle" id="shakeBtn">Shake taken</button>
        <div class="streak-wrap">
          <div class="streak" id="shakeStreak"></div>
          <div class="streak-title" id="shakeTitle"></div>
        </div>
      </div>
    </div>

    <h2>Log an Exercise</h2>
    <div class="card">
      <input id="exName" placeholder="Exercise — e.g. Bench press" list="exNames">
      <datalist id="exNames"></datalist>
      <div class="row" style="margin-top:10px">
        <input id="exWeight" type="number" inputmode="decimal" placeholder="kg" step="0.5">
        <input id="exSets" type="number" inputmode="numeric" placeholder="sets" step="1" min="1">
        <input id="exReps" type="number" inputmode="numeric" placeholder="reps" step="1" min="1">
      </div>
      <button id="exAdd" style="width:100%;margin-top:10px">Add exercise</button>
      <button id="repeatBtn" class="ghost" style="width:100%;margin-top:8px">↻ Repeat last workout</button>
    </div>

    <h2>Today's Exercises</h2>
    <div class="card"><ul id="exList"></ul></div>
  </section>

  <!-- WEIGHT -->
  <section class="view" id="view-weight">
    <h2>Weekly Weigh-In</h2>
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:flex-start">
        <div>
          <div class="big-num" id="weightNow">—<span class="unit"> kg</span></div>
          <div class="hint" id="weightWeek"></div>
        </div>
        <span class="pill" id="weightStatus"></span>
      </div>
      <div class="row" style="margin-top:16px">
        <input id="weightInput" type="number" inputmode="decimal" placeholder="This week's weight" step="0.1">
        <span class="unit">kg</span>
        <button id="weightSave">Save</button>
      </div>
      <div class="hint">Weigh in every Monday.</div>
    </div>

    <h2>Trend</h2>
    <div class="card">
      <div id="weightChart"></div>
      <div class="goal-row">
        <span>🎯 Goal <b id="goalVal">75</b> kg</span>
        <button id="goalEdit" class="ghost">Change</button>
      </div>
    </div>

    <h2>History</h2>
    <div class="card"><div id="weightHistory"></div></div>
  </section>

  <!-- LOG -->
  <section class="view" id="view-log">
    <h2>This Week</h2>
    <div class="card"><div id="weekSummary"></div></div>

    <h2>Calendar</h2>
    <div class="card"><div id="logCalendar"></div></div>

    <h2>Workout Log</h2>
    <div class="card"><div id="workoutLog"></div></div>

    <h2>Backup</h2>
    <div class="row" style="gap:10px">
      <button id="exportBtn" class="ghost" style="flex:1">Export data</button>
      <button id="importBtn" class="ghost" style="flex:1">Import data</button>
    </div>
    <input type="file" id="importFile" accept="application/json" hidden>

    <button id="resetBtn" class="danger-btn">Reset all data</button>
  </section>
</main>

<nav>
  <button data-view="today" class="active">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9v6M5.5 5.5v13M8 12h8M18.5 5.5v13M22 9v6"/></svg></span>Today</button>
  <button data-view="weight">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4.5"/><path d="M12 7.2v3.3"/><path d="M8.4 8.4a5 5 0 0 1 7.2 0"/></svg></span>Weight</button>
  <button data-view="log">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="3.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>Log</button>
</nav>
<div id="toast" class="toast"></div>

<div id="exModal" class="modal" hidden>
  <div class="modal-card">
    <div class="modal-head"><span id="exModalTitle"></span><button id="exModalClose" class="modal-x" aria-label="close">✕</button></div>
    <div id="exModalBody"></div>
  </div>
</div>

<script>
const APP_VERSION='1.5.2';

/* storage */
const DB={
  get(k,d){ try{ return JSON.parse(localStorage.getItem('gymbro_'+k)) ?? d }catch(e){ return d } },
  set(k,v){ localStorage.setItem('gymbro_'+k, JSON.stringify(v)) }
};

/* dates */
function todayKey(d=new Date()){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dd; }
function mondayOf(d=new Date()){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function mondayKey(d=new Date()){ return todayKey(mondayOf(d)); }
function prettyDate(k){ return new Date(k+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}); }
function isMonday(){ return new Date().getDay()===1; }

/* one-time reset: wipe all logged data once when this token changes */
const RESET_TOKEN='reset-2026-07-22';
if(localStorage.getItem('gymbro_reset')!==RESET_TOKEN){
  Object.keys(localStorage).filter(k=>k.startsWith('gymbro_')).forEach(k=>localStorage.removeItem(k));
  localStorage.setItem('gymbro_reset',RESET_TOKEN);
}

/* state */
let exercises=DB.get('exercises',{});
let weights=DB.get('weights',{});
let shakes=DB.get('shakes',{});
let goal=DB.get('goal',75);                  // goal weight in kg
let calRef=new Date(); calRef.setDate(1);   // month shown on the calendar

document.getElementById('verLabel').textContent='v'+APP_VERSION;

/* toast */
let toastT;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400); }
function norm(s){ return s.trim().toLowerCase(); }

/* nav */
document.querySelectorAll('nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('view-'+b.dataset.view).classList.add('active');
    if(b.dataset.view==='weight') renderWeight();
    if(b.dataset.view==='log') renderLog();
  };
});

/* shake */
function shakeTier(n){
  if(n<=0) return 'Bone Dry 💀';
  if(n===1) return 'Amateur Shaker';
  if(n<=3)  return 'Getting Shaky';
  if(n<=6)  return 'Shake Apprentice';
  if(n<=13) return 'Weekly Warrior';
  if(n<=20) return 'Blender Boss';
  if(n<=29) return 'Protein Prophet';
  if(n<=59) return 'Shake Sensei 🥷';
  if(n<=89) return 'Swole Shaman';
  if(n<=179)return 'Lactose Legend';
  return 'Almighty Shake Lord 👑';
}
function renderShake(){
  const box=document.getElementById('shakeBox');
  const done=!!shakes[todayKey()];
  box.classList.toggle('done',done);
  document.getElementById('shakeLabel').textContent=done?'Shake taken ✓':'Not logged yet';
  document.getElementById('shakeBtn').textContent='Shake taken';
  let s=0,d=new Date();
  while(shakes[todayKey(d)]){ s++; d.setDate(d.getDate()-1); }
  document.getElementById('shakeStreak').textContent = s>0 ? '🔥 '+s+'-day streak' : 'No streak yet';
  document.getElementById('shakeTitle').textContent = shakeTier(s);
}
document.getElementById('shakeBtn').onclick=()=>{ const k=todayKey(); if(shakes[k])delete shakes[k];else shakes[k]=true; DB.set('shakes',shakes); renderShake(); };

/* exercises */
/* all-time best weight for an exercise (across all days) */
function bestFor(name){ let m=null; Object.values(exercises).forEach(arr=>arr.forEach(it=>{ if(it.weight!=null && norm(it.name)===norm(name)) m=(m==null)?it.weight:Math.max(m,it.weight); })); return m; }
/* most recent logged entry for an exercise (for weight/sets/reps recall) */
function lastEntryFor(name){ let e=null; Object.keys(exercises).sort().forEach(day=>exercises[day].forEach(it=>{ if(norm(it.name)===norm(name)) e=it; })); return e; }
/* training volume of a single entry = weight × reps × sets (legacy weight-only = weight) */
function vol(it){ return (it.weight!=null?it.weight:0)*(it.reps||1)*(it.sets||1); }
/* display string for an entry, e.g. "3×5 · 60 kg" */
function fmtEntry(it){
  const w = it.weight!=null ? it.weight+' kg' : '';
  const sr = (it.sets||it.reps) ? ((it.sets||1)+'×'+(it.reps||1)) : '';
  return [sr,w].filter(Boolean).join(' · ') || '—';
}
/* rebuild the autocomplete list of past exercise names */
function updateExNames(){
  const set=new Set(); Object.values(exercises).forEach(arr=>arr.forEach(it=>set.add(it.name)));
  document.getElementById('exNames').innerHTML=[...set].sort().map(n=>'<option value="'+n.replace(/"/g,'&quot;')+'"></option>').join('');
}

function renderExercises(){
  const list=document.getElementById('exList');
  const items=exercises[todayKey()]||[];
  if(!items.length){ list.innerHTML='<div class="empty">Nothing logged today.</div>'; return; }
  list.innerHTML='';
  items.forEach((it,i)=>{
    const isBest = it.weight!=null && it.weight===bestFor(it.name);
    const li=document.createElement('li'); li.className='entry';
    li.innerHTML='<span class="name link"></span><span class="w"></span><button class="del" aria-label="delete">✕</button>';
    li.querySelector('.name').textContent=it.name+(isBest?' 🏆':'');
    li.querySelector('.name').onclick=()=>openExerciseHistory(it.name);
    li.querySelector('.w').textContent=fmtEntry(it);
    li.querySelector('.del').onclick=()=>{ items.splice(i,1); if(!items.length)delete exercises[todayKey()]; DB.set('exercises',exercises); updateExNames(); renderExercises(); };
    list.appendChild(li);
  });
}

const exNameEl=document.getElementById('exName'), exWeightEl=document.getElementById('exWeight'),
      exSetsEl=document.getElementById('exSets'), exRepsEl=document.getElementById('exReps');
function prefillFromLast(){
  const e=lastEntryFor(exNameEl.value); if(!e) return;
  if(exWeightEl.value==='' && e.weight!=null) exWeightEl.value=e.weight;
  if(exSetsEl.value==='' && e.sets!=null) exSetsEl.value=e.sets;
  if(exRepsEl.value==='' && e.reps!=null) exRepsEl.value=e.reps;
}
exNameEl.addEventListener('change',prefillFromLast);
exNameEl.addEventListener('input',()=>{ const names=new Set(); Object.values(exercises).forEach(a=>a.forEach(it=>names.add(norm(it.name)))); if(names.has(norm(exNameEl.value))) prefillFromLast(); });

document.getElementById('exAdd').onclick=()=>{
  const name=exNameEl.value.trim();
  if(!name)return;
  const weight=exWeightEl.value===''?null:parseFloat(exWeightEl.value);
  const sets=exSetsEl.value===''?null:parseInt(exSetsEl.value,10);
  const reps=exRepsEl.value===''?null:parseInt(exRepsEl.value,10);
  const prevBest=bestFor(name);               // best BEFORE this entry
  const k=todayKey();
  (exercises[k]=exercises[k]||[]).push({name,weight,sets,reps});
  DB.set('exercises',exercises);
  if(weight!=null && prevBest!=null && weight>prevBest) showToast('🏆 New PR — '+name+' '+weight+' kg');
  exNameEl.value=''; exWeightEl.value=''; exSetsEl.value=''; exRepsEl.value=''; exNameEl.focus();
  updateExNames(); renderExercises();
};
exRepsEl.addEventListener('keydown',e=>{ if(e.key==='Enter')document.getElementById('exAdd').click(); });

/* repeat last workout */
function repeatLastWorkout(){
  const today=todayKey();
  const days=Object.keys(exercises).filter(k=>k<today && exercises[k] && exercises[k].length).sort();
  if(!days.length){ showToast('No previous workout to repeat'); return; }
  const last=days[days.length-1];
  const copy=exercises[last].map(it=>({name:it.name,weight:it.weight,sets:it.sets,reps:it.reps}));
  if(!confirm('Copy '+copy.length+' exercise'+(copy.length>1?'s':'')+' from '+prettyDate(last)+' into today?')) return;
  exercises[today]=(exercises[today]||[]).concat(copy);
  DB.set('exercises',exercises); updateExNames(); renderExercises();
  showToast('Repeated '+prettyDate(last)+' ✓');
}
document.getElementById('repeatBtn').onclick=repeatLastWorkout;

/* exercise history modal */
function miniChart(points){
  if(!points.length) return '';
  const vals=points.map(p=>p.value);
  const dMin=Math.min(...vals), dMax=Math.max(...vals), center=(dMin+dMax)/2;
  const range=Math.max(2,(dMax-dMin)*1.3);
  const yMax=+(center+range/2).toFixed(1), yMin=+(center-range/2).toFixed(1);
  const W=300,H=140,padL=30,padR=10,padT=12,padB=22, pw=W-padL-padR, ph=H-padT-padB, n=points.length;
  const X=i=> n===1?padL+pw/2:padL+i*(pw/(n-1));
  const Y=v=> padT+(yMax-v)/(yMax-yMin)*ph;
  let grid='',labels='';
  [yMax,yMin].forEach(v=>{ const y=Y(v); grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" class="cg"/>'; labels+='<text x="'+(padL-6)+'" y="'+(y+3)+'" class="cl" text-anchor="end">'+v+'</text>'; });
  const line=points.map((p,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(p.value).toFixed(1)).join(' ');
  const dots=points.map((p,i)=>'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(p.value).toFixed(1)+'" r="3" class="cd"/>').join('');
  const xl=i=>'<text x="'+X(i).toFixed(1)+'" y="'+(H-6)+'" class="cl" text-anchor="middle">'+new Date(points[i].label+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})+'</text>';
  const xlabels=n===1?xl(0):xl(0)+xl(n-1);
  return '<svg viewBox="0 0 '+W+' '+H+'" class="chart" style="margin-bottom:14px">'+grid+labels+'<path d="'+line+'" class="cline"/>'+dots+xlabels+'</svg>';
}
function openExerciseHistory(name){
  const days=Object.keys(exercises).sort();
  const points=[];
  days.forEach(k=>{ const es=exercises[k].filter(it=>norm(it.name)===norm(name)); if(!es.length) return;
    let mw=null; es.forEach(it=>{ if(it.weight!=null) mw=(mw==null)?it.weight:Math.max(mw,it.weight); });
    points.push({k,w:mw}); });
  document.getElementById('exModalTitle').textContent=name;
  const body=document.getElementById('exModalBody');
  if(!points.length){ body.innerHTML='<div class="empty">No history yet.</div>'; }
  else{
    const withW=points.filter(p=>p.w!=null);
    const best=withW.length?Math.max(...withW.map(p=>p.w)):null;
    const bestLine=best!=null?'<div class="hint" style="margin:0 0 12px">🏆 Best: '+best+' kg · '+points.length+' session'+(points.length>1?'s':'')+'</div>':'';
    const chart=withW.length?miniChart(withW.map(p=>({label:p.k,value:p.w}))):'';
    const rows=points.slice().reverse().map(p=>'<div class="weekrow"><span class="muted">'+prettyDate(p.k)+'</span><span class="kg">'+(p.w!=null?p.w+' kg':'—')+'</span></div>').join('');
    body.innerHTML=bestLine+chart+rows;
  }
  document.getElementById('exModal').hidden=false;
}
document.getElementById('exModalClose').onclick=()=>document.getElementById('exModal').hidden=true;
document.getElementById('exModal').onclick=e=>{ if(e.target.id==='exModal') document.getElementById('exModal').hidden=true; };

/* weight */
function renderWeightChart(){
  const box=document.getElementById('weightChart');
  const keys=Object.keys(weights).sort();
  if(!keys.length){ box.innerHTML='<div class="empty">Log a weigh-in to see your graph.</div>'; return; }
  const vals=keys.map(k=>weights[k]);
  const lo=Math.min(...vals, goal), hi=Math.max(...vals, goal);   // include goal so its line shows
  const center=(lo+hi)/2;
  const range=Math.max(3,(hi-lo)*1.3);            // min 3 kg window, auto-expands
  const yMax=+(center+range/2).toFixed(1), yMin=+(center-range/2).toFixed(1);
  const W=320,H=170,padL=34,padR=12,padT=14,padB=26, pw=W-padL-padR, ph=H-padT-padB, n=keys.length;
  const X=i=> n===1 ? padL+pw/2 : padL+i*(pw/(n-1));
  const Y=v=> padT+(yMax-v)/(yMax-yMin)*ph;
  let grid='',labels='';
  [yMax,+center.toFixed(1),yMin].forEach(v=>{ const y=Y(v);
    grid+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" class="cg"/>';
    labels+='<text x="'+(padL-6)+'" y="'+(y+3)+'" class="cl" text-anchor="end">'+v+'</text>'; });
  const line=keys.map((k,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(vals[i]).toFixed(1)).join(' ');
  const area='M'+X(0).toFixed(1)+' '+(padT+ph)+' '+keys.map((k,i)=>'L'+X(i).toFixed(1)+' '+Y(vals[i]).toFixed(1)).join(' ')+' L'+X(n-1).toFixed(1)+' '+(padT+ph)+' Z';
  const dots=keys.map((k,i)=>'<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(vals[i]).toFixed(1)+'" r="3.5" class="cd"/>').join('');
  const xl=i=>'<text x="'+X(i).toFixed(1)+'" y="'+(H-8)+'" class="cl" text-anchor="middle">'+new Date(keys[i]+'T00:00:00').toLocaleDateString(undefined,{day:'numeric',month:'short'})+'</text>';
  const xlabels = n===1 ? xl(0) : xl(0)+xl(n-1);
  let goalLine='';
  if(goal>=yMin && goal<=yMax){ const gy=+Y(goal).toFixed(1);
    goalLine='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" class="cgoal"/>'
      +'<text x="'+(W-padR)+'" y="'+(gy-4)+'" class="cl" text-anchor="end" fill="var(--neon2)">goal '+goal+'</text>'; }
  box.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" class="chart"><path d="'+area+'" class="carea"/>'+grid+labels+goalLine+'<path d="'+line+'" class="cline"/>'+dots+xlabels+'</svg>';
}

function renderCalendar(){
  const box=document.getElementById('logCalendar');
  const year=calRef.getFullYear(), month=calRef.getMonth();
  const first=new Date(year,month,1);
  const startDay=(first.getDay()+6)%7;                 // Mon=0
  const days=new Date(year,month+1,0).getDate();
  const tK=todayKey(), now=new Date();
  const atCurrent = year===now.getFullYear() && month===now.getMonth();
  let h='<div class="cal-nav"><button class="cal-btn" id="calPrev" aria-label="previous month">‹</button>'
      +'<div class="cal-head">'+first.toLocaleDateString(undefined,{month:'long',year:'numeric'})+'</div>'
      +'<button class="cal-btn" id="calNext" aria-label="next month"'+(atCurrent?' disabled':'')+'>›</button></div>';
  h+='<div class="cal-grid">';
  ['M','T','W','T','F','S','S'].forEach(d=>h+='<div class="cal-dow">'+d+'</div>');
  for(let i=0;i<startDay;i++) h+='<div class="cal-cell"></div>';
  for(let d=1;d<=days;d++){
    const k=todayKey(new Date(year,month,d));
    const done=exercises[k]&&exercises[k].length;
    const shk=!!shakes[k];
    h+='<div class="cal-cell'+(done?' done':'')+(k===tK?' today':'')+'">'+d+(shk?'<span class="cal-dot"></span>':'')+'</div>';
  }
  box.innerHTML=h+'</div>';
  document.getElementById('calPrev').onclick=()=>{ calRef.setMonth(calRef.getMonth()-1); renderCalendar(); };
  document.getElementById('calNext').onclick=()=>{ if(atCurrent)return; calRef.setMonth(calRef.getMonth()+1); renderCalendar(); };
}

function renderWeight(){
  document.getElementById('goalVal').textContent=goal;
  renderWeightChart();
  const mk=mondayKey(), cur=weights[mk];
  document.getElementById('weightNow').innerHTML=(cur!=null?cur:'—')+'<span class="unit"> kg</span>';
  document.getElementById('weightWeek').textContent='Week of '+prettyDate(mk);
  const st=document.getElementById('weightStatus');
  if(cur!=null){ st.textContent='Logged'; st.className='pill ok'; }
  else if(isMonday()){ st.textContent='Due today'; st.className='pill due'; }
  else { st.textContent='Not logged'; st.className='pill'; }
  if(cur!=null)document.getElementById('weightInput').value=cur;
  const keys=Object.keys(weights).sort().reverse();
  const hist=document.getElementById('weightHistory');
  if(!keys.length){ hist.innerHTML='<div class="empty">No weigh-ins yet.</div>'; return; }
  hist.innerHTML='';
  keys.forEach((k,i)=>{
    const prev=keys[i+1]; let delta='';
    if(prev!=null){ const dv=+(weights[k]-weights[prev]).toFixed(1); if(dv!==0)delta='<span class="delta '+(dv>0?'up':'down')+'">'+(dv>0?'+':'')+dv+'</span>'; }
    const row=document.createElement('div'); row.className='weekrow';
    row.innerHTML='<span class="wk">'+prettyDate(k)+'</span><span class="kg">'+weights[k]+' kg'+delta+'</span>';
    hist.appendChild(row);
  });
}
document.getElementById('weightSave').onclick=()=>{ const v=document.getElementById('weightInput').value; if(v==='')return; weights[mondayKey()]=parseFloat(v); DB.set('weights',weights); renderWeight(); showToast('Weight saved ✓'); };
document.getElementById('goalEdit').onclick=()=>{
  const v=prompt('Set your goal weight (kg):', goal);
  if(v==null) return;
  const n=parseFloat(v);
  if(isNaN(n)||n<=0){ alert('Enter a valid number.'); return; }
  goal=n; DB.set('goal',goal); renderWeight(); showToast('Goal set to '+goal+' kg');
};

/* log */
function renderWeekSummary(){
  const box=document.getElementById('weekSummary');
  const mon=mondayOf(); let workouts=0, volume=0, shakeDays=0;
  for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); const k=todayKey(d);
    if(exercises[k]&&exercises[k].length){ workouts++; volume+=exercises[k].reduce((s,it)=>s+vol(it),0); }
    if(shakes[k]) shakeDays++;
  }
  box.innerHTML='<div class="wsum">'
    +'<div><div class="val">'+workouts+'</div><div class="lbl">Workouts</div></div>'
    +'<div><div class="val">'+Math.round(volume)+'</div><div class="lbl">kg Volume</div></div>'
    +'<div><div class="val">'+shakeDays+'</div><div class="lbl">Shakes</div></div></div>';
}
function renderLog(){
  calRef=new Date(); calRef.setDate(1);   // reset to current month each time Log opens
  renderWeekSummary();
  renderCalendar();
  const el=document.getElementById('workoutLog');
  const days=Object.keys(exercises).sort().reverse();
  if(!days.length){ el.innerHTML='<div class="empty">No workouts logged yet.</div>'; return; }
  el.innerHTML='';
  days.forEach(day=>{
    const head=document.createElement('div'); head.className='weekrow';
    const shk=shakes[day]?' · 🥤':'';
    const cnt=exercises[day].length;
    const totVol=exercises[day].reduce((s,it)=>s+vol(it),0);
    const kgStr=totVol>0?' · '+Math.round(totVol)+' kg':'';
    head.innerHTML='<span class="wk">'+prettyDate(day)+shk+'</span><span class="muted">'+cnt+' exercise'+(cnt>1?'s':'')+kgStr+'</span>';
    el.appendChild(head);
    exercises[day].forEach(it=>{
      const r=document.createElement('div'); r.className='weekrow';
      r.innerHTML='<span class="muted link" style="padding-left:8px">'+it.name+'</span><span class="kg">'+fmtEntry(it)+'</span>';
      r.querySelector('.link').onclick=()=>openExerciseHistory(it.name);
      el.appendChild(r);
    });
  });
}

/* reset all data */
document.getElementById('resetBtn').onclick=()=>{
  if(!confirm('Reset all data? This erases every weigh-in, exercise, and shake. This cannot be undone.')) return;
  Object.keys(localStorage).filter(k=>k.startsWith('gymbro_')&&k!=='gymbro_reset').forEach(k=>localStorage.removeItem(k));
  exercises={}; weights={}; shakes={}; goal=75; DB.set('goal',goal);
  updateExNames(); renderShake(); renderExercises(); renderWeight(); renderLog();
};

/* backup: export / import */
function exportData(){
  const data={app:'GymBro',version:APP_VERSION,exportedAt:new Date().toISOString(),exercises,weights,shakes,goal};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='gymbro-backup-'+todayKey()+'.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
document.getElementById('exportBtn').onclick=exportData;
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||typeof d!=='object') throw 0;
      if(!confirm('Import this backup? It replaces your current data.')){ e.target.value=''; return; }
      exercises=(d.exercises&&typeof d.exercises==='object')?d.exercises:{};
      weights=(d.weights&&typeof d.weights==='object')?d.weights:{};
      shakes=(d.shakes&&typeof d.shakes==='object')?d.shakes:{};
      if(typeof d.goal==='number' && d.goal>0) goal=d.goal;
      DB.set('exercises',exercises); DB.set('weights',weights); DB.set('shakes',shakes); DB.set('goal',goal);
      updateExNames(); renderShake(); renderExercises(); renderWeight(); renderLog();
      showToast('Backup imported ✓');
    }catch(err){ alert('Could not read that backup file.'); }
    e.target.value='';
  };
  r.readAsText(f);
};

updateExNames(); renderShake(); renderExercises();

/* service worker + auto-update */
if('serviceWorker' in navigator){
  const hadController=!!navigator.serviceWorker.controller;
  let reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(reloaded) return;
    if(hadController){ reloaded=true; location.reload(); }  // a new version took over -> refresh once
  });
  navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(reg=>{
    reg.update();                                   // check for a newer SW on every launch
    setInterval(()=>reg.update(), 60*60*1000);      // and hourly while open
  }).catch(()=>{});
}
