<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GymBro">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>GymBro</title>
<style>
  :root{
    --bg:#ffffff; --card:#f6f6f7; --ink:#1a1a1a; --muted:#8a8a8f;
    --line:#e6e6e8; --accent:#1a1a1a; --good:#22a06b; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
    padding-top:env(safe-area-inset-top);
  }
  header{
    display:flex; align-items:center; gap:10px;
    padding:14px 20px 10px; flex:0 0 auto;
  }
  header img{width:30px;height:30px}
  header h1{font-size:20px;font-weight:800;letter-spacing:-.5px;margin:0}
  header .date{margin-left:auto;font-size:13px;color:var(--muted);font-weight:600}
  main{flex:1 1 auto; overflow-y:auto; padding:4px 20px 24px; -webkit-overflow-scrolling:touch}
  .view{display:none}
  .view.active{display:block}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:22px 0 10px;font-weight:700}
  .card{background:var(--card);border-radius:var(--radius);padding:18px}
  .row{display:flex;gap:10px;align-items:center}
  input,select{
    font-size:16px;font-family:inherit;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:14px;width:100%;outline:none;
  }
  input:focus,select:focus{border-color:var(--ink)}
  button{
    font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
    border:none;border-radius:12px;padding:14px 18px;
    background:var(--ink);color:#fff;
  }
  button:active{opacity:.85}
  button.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .big-num{font-size:42px;font-weight:800;letter-spacing:-1px;line-height:1}
  .unit{font-size:16px;color:var(--muted);font-weight:600}
  .hint{font-size:13px;color:var(--muted);margin-top:6px}
  .pill{display:inline-block;font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--muted)}
  .pill.due{background:var(--ink);color:#fff;border-color:var(--ink)}
  ul{list-style:none;margin:0;padding:0}
  li.entry{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}
  li.entry:last-child{border-bottom:none}
  li.entry .name{font-weight:600}
  li.entry .w{margin-left:auto;font-weight:700}
  li.entry .del{margin-left:8px;background:none;color:var(--muted);border:none;padding:6px;font-size:18px;font-weight:400}
  .empty{color:var(--muted);font-size:14px;padding:14px 0}
  /* shake toggle */
  .shake{display:flex;flex-direction:column;align-items:center;gap:16px;padding:26px}
  .shake .glass{font-size:64px;filter:grayscale(1);opacity:.35;transition:.2s}
  .shake.done .glass{filter:none;opacity:1}
  .shake .label{font-weight:700;font-size:17px}
  .toggle{
    width:100%;padding:18px;border-radius:14px;border:2px solid var(--line);
    background:#fff;color:var(--ink);font-size:16px;font-weight:700;
  }
  .shake.done .toggle{background:var(--good);border-color:var(--good);color:#fff}
  .streak{font-size:13px;color:var(--muted)}
  /* nav */
  nav{
    flex:0 0 auto;display:flex;border-top:1px solid var(--line);
    background:var(--bg);padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;background:none;color:var(--muted);border:none;border-radius:0;
    padding:12px 0 10px;font-size:11px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  nav button .ico{font-size:22px;line-height:1}
  nav button.active{color:var(--ink)}
  .weekrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .weekrow:last-child{border-bottom:none}
  .weekrow .wk{font-weight:600}
  .weekrow .kg{font-weight:700}
  .weekrow .muted{color:var(--muted);font-weight:500}
  .delta{font-size:12px;font-weight:700;margin-left:8px}
  .delta.up{color:#d1495b}.delta.down{color:var(--good)}
</style>
</head>
<body>
<header>
  <img src="icons/icon-192.png" alt="" onerror="this.style.display='none'">
  <h1>GymBro</h1>
  <span class="date" id="todayLabel"></span>
</header>

<main>
  <!-- TODAY / WORKOUT -->
  <section class="view active" id="view-today">
    <h2>Today's Shake</h2>
    <div class="card">
      <div class="shake" id="shakeBox">
        <div class="glass">🥤</div>
        <div class="label" id="shakeLabel">Not logged yet</div>
        <button class="toggle" id="shakeBtn">Mark shake as taken</button>
        <div class="streak" id="shakeStreak"></div>
      </div>
    </div>

    <h2>Log an Exercise</h2>
    <div class="card">
      <div class="row">
        <input id="exName" placeholder="Exercise (e.g. Bench press)" autocomplete="off">
      </div>
      <div class="row" style="margin-top:10px">
        <input id="exWeight" type="number" inputmode="decimal" placeholder="Weight" step="0.5">
        <span class="unit">kg</span>
        <button id="exAdd">Add</button>
      </div>
    </div>

    <h2>Today's Exercises</h2>
    <div class="card">
      <ul id="exList"></ul>
    </div>
  </section>

  <!-- WEIGHT -->
  <section class="view" id="view-weight">
    <h2>Weekly Weigh-In</h2>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div class="big-num" id="weightNow">—<span class="unit"> kg</span></div>
          <div class="hint" id="weightWeek"></div>
        </div>
        <span class="pill" id="weightStatus"></span>
      </div>
      <div class="row" style="margin-top:16px">
        <input id="weightInput" type="number" inputmode="decimal" placeholder="This week's weight" step="0.1">
        <span class="unit">kg</span>
        <button id="weightSave">Save</button>
      </div>
      <div class="hint">Weigh in every Monday.</div>
    </div>

    <h2>History</h2>
    <div class="card">
      <div id="weightHistory"></div>
    </div>
  </section>

  <!-- LOG / HISTORY of workouts -->
  <section class="view" id="view-log">
    <h2>Workout Log</h2>
    <div class="card">
      <div id="workoutLog"></div>
    </div>
  </section>
</main>

<nav>
  <button data-view="today" class="active"><span class="ico">🏋️</span>Today</button>
  <button data-view="weight"><span class="ico">⚖️</span>Weight</button>
  <button data-view="log"><span class="ico">📅</span>Log</button>
</nav>

<script>
/* ---------- storage ---------- */
const DB = {
  get(k,d){ try{ return JSON.parse(localStorage.getItem('gymbro_'+k)) ?? d }catch(e){ return d } },
  set(k,v){ localStorage.setItem('gymbro_'+k, JSON.stringify(v)) }
};

/* ---------- date helpers ---------- */
function todayKey(d=new Date()){ return d.toISOString().slice(0,10); }
function mondayOf(d=new Date()){
  const x=new Date(d); const day=(x.getDay()+6)%7; // 0=Mon
  x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x;
}
function mondayKey(d=new Date()){ return todayKey(mondayOf(d)); }
function prettyDate(key){
  const d=new Date(key+'T00:00:00');
  return d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});
}
function isMonday(){ return new Date().getDay()===1; }

/* ---------- state ---------- */
let exercises = DB.get('exercises',{});   // { 'YYYY-MM-DD': [{name,weight}] }
let weights   = DB.get('weights',{});     // { 'YYYY-MM-DD'(monday): kg }
let shakes    = DB.get('shakes',{});      // { 'YYYY-MM-DD': true }

/* ---------- header ---------- */
document.getElementById('todayLabel').textContent =
  new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});

/* ---------- nav ---------- */
document.querySelectorAll('nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('view-'+b.dataset.view).classList.add('active');
    if(b.dataset.view==='weight') renderWeight();
    if(b.dataset.view==='log') renderLog();
  };
});

/* ---------- shake ---------- */
function renderShake(){
  const box=document.getElementById('shakeBox');
  const done=!!shakes[todayKey()];
  box.classList.toggle('done',done);
  document.getElementById('shakeLabel').textContent = done ? 'Shake taken today ✓' : 'Not logged yet';
  document.getElementById('shakeBtn').textContent = done ? 'Undo' : 'Mark shake as taken';
  // streak
  let s=0, d=new Date();
  while(shakes[todayKey(d)]){ s++; d.setDate(d.getDate()-1); }
  document.getElementById('shakeStreak').textContent = s>1 ? '🔥 '+s+'-day streak' : '';
}
document.getElementById('shakeBtn').onclick=()=>{
  const k=todayKey();
  if(shakes[k]) delete shakes[k]; else shakes[k]=true;
  DB.set('shakes',shakes); renderShake();
};

/* ---------- exercises ---------- */
function renderExercises(){
  const list=document.getElementById('exList');
  const items=exercises[todayKey()]||[];
  if(!items.length){ list.innerHTML='<div class="empty">No exercises logged today.</div>'; return; }
  list.innerHTML='';
  items.forEach((it,i)=>{
    const li=document.createElement('li'); li.className='entry';
    li.innerHTML=`<span class="name"></span><span class="w"></span>
      <button class="del" aria-label="delete">✕</button>`;
    li.querySelector('.name').textContent=it.name;
    li.querySelector('.w').textContent=(it.weight||it.weight===0)?it.weight+' kg':'';
    li.querySelector('.del').onclick=()=>{ items.splice(i,1); if(!items.length) delete exercises[todayKey()]; DB.set('exercises',exercises); renderExercises(); };
    list.appendChild(li);
  });
}
document.getElementById('exAdd').onclick=()=>{
  const name=document.getElementById('exName').value.trim();
  const wv=document.getElementById('exWeight').value;
  if(!name) return;
  const k=todayKey();
  (exercises[k]=exercises[k]||[]).push({name, weight: wv===''?null:parseFloat(wv)});
  DB.set('exercises',exercises);
  document.getElementById('exName').value=''; document.getElementById('exWeight').value='';
  document.getElementById('exName').focus();
  renderExercises();
};
document.getElementById('exWeight').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('exAdd').click(); });

/* ---------- weight ---------- */
function renderWeight(){
  const mk=mondayKey();
  const cur=weights[mk];
  document.getElementById('weightNow').innerHTML = (cur!=null?cur:'—')+'<span class="unit"> kg</span>';
  document.getElementById('weightWeek').textContent = 'Week of '+prettyDate(mk);
  const st=document.getElementById('weightStatus');
  if(cur!=null){ st.textContent='Logged ✓'; st.className='pill'; }
  else if(isMonday()){ st.textContent='Due today'; st.className='pill due'; }
  else { st.textContent='Not logged'; st.className='pill'; }
  if(cur!=null) document.getElementById('weightInput').value=cur;
  // history
  const keys=Object.keys(weights).sort().reverse();
  const hist=document.getElementById('weightHistory');
  if(!keys.length){ hist.innerHTML='<div class="empty">No weigh-ins yet.</div>'; return; }
  hist.innerHTML='';
  keys.forEach((k,i)=>{
    const prev=keys[i+1]; let delta='';
    if(prev!=null){
      const dv=+(weights[k]-weights[prev]).toFixed(1);
      if(dv!==0) delta=`<span class="delta ${dv>0?'up':'down'}">${dv>0?'+':''}${dv}</span>`;
    }
    const row=document.createElement('div'); row.className='weekrow';
    row.innerHTML=`<span class="wk">${prettyDate(k)}</span><span class="kg">${weights[k]} kg${delta}</span>`;
    hist.appendChild(row);
  });
}
document.getElementById('weightSave').onclick=()=>{
  const v=document.getElementById('weightInput').value;
  if(v==='') return;
  weights[mondayKey()]=parseFloat(v);
  DB.set('weights',weights); renderWeight();
};

/* ---------- workout log ---------- */
function renderLog(){
  const el=document.getElementById('workoutLog');
  const days=Object.keys(exercises).sort().reverse();
  if(!days.length){ el.innerHTML='<div class="empty">No workouts logged yet.</div>'; return; }
  el.innerHTML='';
  days.forEach(day=>{
    const head=document.createElement('div'); head.className='weekrow';
    const shk=shakes[day]?' · 🥤':'';
    head.innerHTML=`<span class="wk">${prettyDate(day)}${shk}</span><span class="muted">${exercises[day].length} exercise${exercises[day].length>1?'s':''}</span>`;
    el.appendChild(head);
    exercises[day].forEach(it=>{
      const r=document.createElement('div'); r.className='weekrow';
      r.innerHTML=`<span class="muted" style="padding-left:8px">${it.name}</span><span class="kg">${it.weight!=null?it.weight+' kg':'—'}</span>`;
      el.appendChild(r);
    });
  });
}

/* ---------- init ---------- */
renderShake(); renderExercises();

/* ---------- service worker ---------- */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
